version: '3.8'

services:
  voice-gateway:
    build: 
      context: ./voice-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
    depends_on:
      - firestore-emulator
      - conversation-engine

  conversation-engine:
    build: 
      context: ./conversation-engine
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
    depends_on:
      - firestore-emulator

  booking-service:
    build: 
      context: ./booking-service
      dockerfile: Dockerfile.dev
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=local

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - voice-gateway

  firestore-emulator:
    image: google/cloud-sdk:emulators
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8080
    ports:
      - "8085:8080"
